<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soul Tools</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Soul Tools ⚡</h1>

  <div class="card">
    <h2>Clone Server</h2>
    <input id="guildId" placeholder="Server ID">
    <button onclick="clone()">Clone Now</button>
  </div>

  <div class="card">
    <h2>Link Checker</h2>
    <input id="link" placeholder="https://example.com">
    <button onclick="check()">Check</button>
    <p id="result"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
