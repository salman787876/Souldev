<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Soul AI Chat 🔥</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  display: flex;
}

.sidebar {
  width: 250px;
  background: #1a1a1a;
  padding: 15px;
  height: 100vh;
  overflow-y: auto;
}

.sidebar button {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  background: orange;
  border: none;
  cursor: pointer;
}

.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}

.msg {
  margin: 10px 0;
  padding: 10px;
  border-radius: 10px;
}

.user {
  background: orange;
  color: black;
  align-self: flex-end;
}

.bot {
  background: #2a2a2a;
}

.input {
  display: flex;
  padding: 10px;
  background: #1a1a1a;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
}

.send {
  padding: 10px;
  background: orange;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="newChat()">+ New Chat</button>
  <input id="apikey" placeholder="API Key">
  <div id="history"></div>
</div>

<div class="chat">
  <div id="messages" class="messages"></div>

  <div class="input">
    <input id="input" placeholder="Type message...">
    <button class="send" onclick="send()">Send</button>
  </div>
</div>

<script>
let chats = JSON.parse(localStorage.getItem("chats")) || {};
let currentChat = null;

function save() {
  localStorage.setItem("chats", JSON.stringify(chats));
}

function newChat() {
  const id = Date.now();
  chats[id] = [];
  currentChat = id;
  render();
}

function render() {
  const history = document.getElementById("history");
  history.innerHTML = "";

  for (let id in chats) {
    const btn = document.createElement("button");
    btn.innerText = "Chat " + id;
    btn.onclick = () => {
      currentChat = id;
      renderMessages();
    };
    history.appendChild(btn);
  }

  renderMessages();
}

function renderMessages() {
  const box = document.getElementById("messages");
  box.innerHTML = "";

  if (!currentChat) return;

  chats[currentChat].forEach(m => {
    const div = document.createElement("div");
    div.className = "msg " + m.role;
    div.innerText = m.content;
    box.appendChild(div);
  });
}

async function send() {
  const input = document.getElementById("input");
  const key = document.getElementById("apikey").value;

  if (!currentChat) newChat();

  const text = input.value;
  if (!text) return;

  chats[currentChat].push({ role: "user", content: text });
  renderMessages();
  input.value = "";

  const res = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + key,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "gpt-4o-mini",
      messages: chats[currentChat]
    })
  });

  const data = await res.json();
  const reply = data.choices?.[0]?.message?.content || "Error";

  chats[currentChat].push({ role: "bot", content: reply });

  save();
  renderMessages();
}

render();
</script>

</body>
</html>
