<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Souldev - Color & QR Tools</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; text-align:center; padding:20px; }
    h1 { margin-bottom:30px; }
    .tool { background:#222; padding:20px; margin:20px auto; border-radius:10px; width:300px; }
    input, button { padding:10px; margin:5px 0; width:90%; border-radius:5px; border:none; }
    button { cursor:pointer; background:#0ff; color:#000; font-weight:bold; }
    img { margin-top:10px; border:2px solid #0ff; border-radius:10px; }
  </style>
</head>
<body>

<h1>Souldev Tools</h1>

<div class="tool">
  <h2>Color Picker & Converter</h2>
  <input type="color" id="colorPicker">
  <p>Hex: <span id="hexCode">#ffffff</span></p>
  <p>RGB: <span id="rgbCode">rgb(255,255,255)</span></p>
</div>

<div class="tool">
  <h2>QR Generator</h2>
  <input type="text" id="qrInput" placeholder="Enter text or URL">
  <button onclick="generateQR()">Generate QR</button>
  <div id="qrResult"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script>
  // Color Picker
  const colorPicker = document.getElementById('colorPicker');
  const hexCode = document.getElementById('hexCode');
  const rgbCode = document.getElementById('rgbCode');

  colorPicker.addEventListener('input', () => {
    const hex = colorPicker.value;
    hexCode.textContent = hex;

    const bigint = parseInt(hex.slice(1), 16);
    const r = (bigint >> 16) & 255;
    const g = (bigint >> 8) & 255;
    const b = bigint & 255;
    rgbCode.textContent = `rgb(${r},${g},${b})`;
  });

  // QR Generator
  function generateQR(){
    const text = document.getElementById('qrInput').value;
    const qrDiv = document.getElementById('qrResult');
    qrDiv.innerHTML = '';
    if(text){
      QRCode.toDataURL(text, { width:200 }, function(err, url){
        if(err){ alert("Error generating QR"); return; }
        const img = document.createElement('img');
        img.src = url;
        qrDiv.appendChild(img);
      });
    }
  }
</script>

</body>
</html>
