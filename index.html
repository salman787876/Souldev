<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Souldev Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/style.css">
  <script src="tools/color.js" defer></script>
  <script src="tools/qr.js" defer></script>
  <script src="tools/password.js" defer></script>
  <script src="tools/base64.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>
  <!-- Header -->
  <div id="header"></div>

  <main>
    <div class="tool" id="colorTool">
      <h2>🎨 Color Picker & Converter</h2>
      <input type="color" id="colorPicker">
      <p>Hex: <span id="hexCode">#ffffff</span></p>
      <p>RGB: <span id="rgbCode">rgb(255,255,255)</span></p>
      <div id="colorPreview"></div>
    </div>

    <div class="tool" id="qrTool">
      <h2>📱 QR Generator</h2>
      <input type="text" id="qrInput" placeholder="Enter text or URL">
      <button id="generateQRBtn">Generate QR</button>
      <div id="qrResult"></div>
    </div>

    <div class="tool" id="passwordTool">
      <h2>🔐 Password Hasher</h2>
      <input type="text" id="passInput" placeholder="Enter password">
      <button id="hashPassBtn">Hash Password (SHA-256)</button>
      <p>Hashed: <span id="hashedPass"></span></p>
    </div>

    <div class="tool" id="base64Tool">
      <h2>📝 Base64 Encode/Decode</h2>
      <textarea id="baseInput" placeholder="Enter text"></textarea>
      <button id="encodeBtn">Encode</button>
      <button id="decodeBtn">Decode</button>
      <p>Result: <span id="baseResult"></span></p>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer"></div>
</body>
</html>
